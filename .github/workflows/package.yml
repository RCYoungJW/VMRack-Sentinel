name: Build and Release VMRack Sentinel

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'  # 当您推送以 v 开头的标签（如 v1.1）时触发自动发布 Release
  workflow_dispatch:      # 支持手动点击运行任务

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write     # 必须开启写入权限，否则无法自动创建 Release

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install playwright pyinstaller

    - name: Build EXE with PyInstaller
      run: |
        # 严格执行您的打包参数：单文件、无控制台窗口
        pyinstaller --noconfirm --onefile --windowed --name "VMRack_Sentinel" vmrack.py

    - name: Upload Artifact (Actions Tab)
      uses: actions/upload-artifact@v4
      with:
        name: VMRack_Sentinel_EXE
        path: dist/VMRack_Sentinel.exe

    - name: Auto Release EXE
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        files: dist/VMRack_Sentinel.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
