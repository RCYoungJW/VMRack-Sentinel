name: Build VMRack Sentinel EXE

on:
  push:
    branches: [ main ]  # 当你推送代码到 main 分支时触发
  workflow_dispatch:      # 允许你在 GitHub 页面手动点击运行

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install playwright pyinstaller

    - name: Build EXE with PyInstaller
      run: |
        pyinstaller --noconfirm --onefile --windowed --name "VMRack_Sentinel" vmrack.py

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: VMRack_Sentinel_EXE
        path: dist/VMRack_Sentinel.exe
