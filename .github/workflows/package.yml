name: Build and Release VMRack Sentinel

on:
  push:
    tags:
      - 'v*'  # 🚀 核心修改：现在仅在推送 v 开头的标签（如 v1.0, v1.1）时触发自动打包
  workflow_dispatch:      # 保留手动触发按钮，以备不时之需

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write     # 必须开启写入权限，用于将 EXE 挂载到 Release 资产中

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install playwright pyinstaller

    - name: Build EXE with Dynamic Version
      # 🚀 保持你的逻辑，确保包含 --icon 负责外壳，--add-data 负责内置图片
      run: |
        pyinstaller --noconfirm --onefile --windowed --icon=icon.ico --add-data "icon.png;." --name "VMRack_Sentinel_${{ github.ref_name }}" vmrack.py

    - name: Upload Artifact (Actions Tab)
      uses: actions/upload-artifact@v4
      with:
        name: VMRack_Sentinel_${{ github.ref_name }}
        path: dist/VMRack_Sentinel_${{ github.ref_name }}.exe

    - name: Auto Release EXE to Release Page
      uses: softprops/action-gh-release@v2
      with:
        files: dist/VMRack_Sentinel_${{ github.ref_name }}.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
